name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request. The PR branch is already checked out.

            Use `gh pr diff` to inspect the changes and `gh pr view` for context.
            Post overall feedback with `gh pr comment --body "..."`.
            For specific line-level issues use `mcp__github_inline_comment__create_inline_comment`.

            Focus on: correctness, security, edge cases, and adherence to project
            conventions described in CLAUDE.md.

            Only post GitHub comments — do not output review text as plain messages.
          claude_args: '--allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git log:*),Bash(git diff:*),Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment"'
